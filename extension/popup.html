<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricsOverlay Bridge</title>
    <style>
		:root {
			--yt-bg: #0f0f0f;
			--yt-surface: #212121;
			--yt-surface-hover: #303030;

			--yt-text-primary: #ffffff;
			--yt-text-secondary: #aaaaaa;

			--yt-border: rgba(255, 255, 255, 0.1);
		}

		body {
			background-color: var(--yt-bg);
			color: var(--yt-text-primary);
			font-family: "Roboto", Arial, sans-serif;
			width: 320px;
			margin: 0;
			padding: 0;
		}

		/* HEADER */
		.header {
			display: flex;
			align-items: center;
			padding: 14px 16px;
			border-bottom: 1px solid var(--yt-border);
		}

		.header h3 {
			margin: 0;
			font-size: 15px;
			font-weight: 500;
		}

		/* CONTENT */
		.content {
			padding: 12px 16px;
			display: flex;
			flex-direction: column;
		}

		/* ROW */
		.setting-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 10px 0;
		}

		.setting-row + .setting-row {
			border-top: 1px solid rgba(255,255,255,0.04);
		}

		/* TEXT */
		.setting-info {
			display: flex;
			flex-direction: column;
			gap: 2px;
		}

		.setting-title {
			font-size: 13px;
			font-weight: 400;
		}

		.setting-desc {
			font-size: 11px;
			color: var(--yt-text-secondary);
		}

		/* BUTTON (YT STYLE: FLAT TEXT BUTTON) */
		button {
			background: transparent;
			border: none;
			color: var(--yt-text-primary);
			font-size: 13px;
			font-weight: 500;
			cursor: pointer;
			padding: 6px 10px;
			border-radius: 2px;
			transition: background 0.15s ease;
		}

		button:hover {
			background-color: var(--yt-surface-hover);
		}

		/* TOGGLE BUTTON (NO BLUE BS) */
		#toggleBtn {
			background-color: var(--yt-surface);
			border: 1px solid var(--yt-border);
		}

		#toggleBtn:hover {
			background-color: var(--yt-surface-hover);
		}

		/* OFF STATE (biarin kalau JS lu pake ini) */
		#toggleBtn.off {
			opacity: 0.6;
		}

		/* SELECT (biar gak keliatan Windows 2005) */
		select {
			background-color: var(--yt-surface);
			color: var(--yt-text-primary);
			border: 1px solid var(--yt-border);
			font-size: 13px;
			padding: 6px 8px;
			border-radius: 2px;
			outline: none;
			cursor: pointer;
		}

		select:hover {
			background-color: var(--yt-surface-hover);
		}

		select:focus {
			border-color: #3ea6ff;
		}

		/* FOOTER */
		.footer {
			padding: 10px 16px;
			font-size: 11px;
			color: var(--yt-text-secondary);
			border-top: 1px solid var(--yt-border);
			text-align: center;
		}
    </style>
</head>
<body>

    <div class="header">
        <h3>LyricsOverlay Bridge</h3>
    </div>

    <div class="content">
        <!-- Master Toggle -->
        <div class="setting-row">
            <div class="setting-info">
                <span class="setting-title">Integration</span>
                <span class="setting-desc">Turn off when you're not using the app.</span>
            </div>
            <button id="toggleBtn">ON</button>
        </div>

        <!-- Source Selection -->
        <div class="setting-row">
            <div class="setting-info">
                <span class="setting-title">Source</span>
            </div>
            <select id="sourceSelect">
                <option value="yt">YouTube CC</option>
                <option value="lrclib">LRCLib</option>
                <option value="legato">Blyrics Legato</option>
                <option value="cubey">MusixMatch (Doesn't work)</option>
            </select>
        </div>

        <!-- Romaji Mode -->
        <div class="setting-row">
            <div class="setting-info">
                <span class="setting-title">Romanize</span>
                <span class="setting-desc">Automatic Transliteration</span>
            </div>
            <button id="romajiBtn">OFF</button>
        </div>

        <!-- Display Mode -->
        <div class="setting-row">
            <div class="setting-info">
                <span class="setting-title">Subtitle Display</span>
				<span class="setting-desc">Only for certain conditions.</span>
            </div>
            <button id="displayBtn">ALL</button>
        </div>
    </div>

    <div class="footer">
        This project is based on BetterLyrics (GPLv3).
    </div>
    <script src="popup.js"></script>
</body>
</html>
