<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LyricsOverlay Settings</title>
    <style>
        body { width: 320px; padding: 16px; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #18181b; color: #f4f4f5; margin: 0; }
        h2 { margin-top: 0; font-size: 18px; font-weight: 600; border-bottom: 1px solid #3f3f46; padding-bottom: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .setting-group { margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        label { font-size: 14px; font-weight: 500; color: #d4d4d8; }
        select { background-color: #27272a; color: #f4f4f5; border: 1px solid #52525b; padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none; cursor: pointer; max-width: 140px; }
        select:focus { border-color: #a855f7; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3f3f46; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #a855f7; }
        input:checked + .slider:before { transform: translateX(20px); }
        .footer { font-size: 12px; color: #71717a; text-align: center; margin-top: 24px; }
    </style>
</head>
<body>
    <h2>🎶 LyricsOverlay Bridge</h2>
    
    <div class="setting-group">
        <label for="displayMode">Display Mode</label>
        <select id="displayMode">
            <option value="all">All Lines</option>
            <option value="top">Top Line Only</option>
        </select>
    </div>

    <div class="setting-group">
        <label for="primarySource">Primary Source</label>
        <select id="primarySource">
            <option value="yt">YouTube Native</option>
            <option value="cubey">Auto</option>
            <option value="lrclib">Lrclib.net</option>
            <option value="legato">Legato</option>
        </select>
    </div>

    <div class="setting-group">
        <label for="romajiToggle">Romaji Conversion</label>
        <label class="switch">
            <input type="checkbox" id="romajiToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="footer">Changes are applied immediately.<br>If a source fails, it auto-falls back! ✨</div>
    <script src="popup.js"></script>
</body>
</html>
